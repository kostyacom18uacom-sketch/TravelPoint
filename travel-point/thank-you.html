<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ďakujeme! – Travel Point</title>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/dot-matrix" rel="stylesheet">

    <!-- Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="icon" href="assets/logo/favicon.svg" type="image/svg+xml">
</head>

<body class="thank-you-page-body">
    <!-- PAGE LOADER -->
    <div id="page-loader">
        <div id="globe-animation"></div>
        <div id="loader-bottom-area">
            <div id="loader-bar-track">
                <div id="loader-bar-fill"></div>
            </div>
            <div id="loader-counter">0%</div>
        </div>
    </div>

    <!-- HEADER (logo only) -->
    <header class="thank-you-header">
        <div class="container d-flex flex-column justify-content-center align-items-center">
            <a href="index.html" class="navbar-brand">
                <img src="assets/logo/travelpoint-logo.svg" alt="Travel Point logo">
            </a>

            <!-- LANGUAGE SWITCHER -->
            <div class="lang-switcher">
                <button class="lang-btn" data-lang="sk" aria-label="Slovenčina">SK</button>
                <span class="lang-divider">|</span>
                <button class="lang-btn" data-lang="en" aria-label="English">EN</button>
            </div>
        </div>
    </header>

    <main class="thank-you thank-you-main">
        <div class="container text-center">
            <div id="thankyou-animation" class="thankyou-animation"></div>

            <h1 class="thank-you-title fade-delayed" id="thankyou-title" data-i18n="thankyou.title">Ďakujeme, vašu požiadavku sme prijali</h1>

            <a href="index.html" class="btn fade-delayed" id="thankyou-button" data-i18n="thankyou.btn">Návrat na hlavnú stránku
              <span class="btn-loader"></span>
            </a>
        </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/loader.js"></script>

    <script>
      (function () {
          document.addEventListener('DOMContentLoaded', function () {
              lottie.loadAnimation({
                  container: document.getElementById('thankyou-animation'),
                  renderer: 'svg',
                  loop: false,
                  autoplay: true,
                  path: 'assets/lottie/animation.json'
              });

              setTimeout(function () {
                  document.getElementById('thankyou-title').classList.add('show');
              }, 1200);

              setTimeout(function () {
                  document.getElementById('thankyou-button').classList.add('show');
              }, 1800);
          });

          window.addEventListener('load', function () {
              setTimeout(TpLoader.hide, 500);
          });
      })();
    </script>

    <script src="js/i18n.js"></script>
    <script src="js/cursor.js"></script>
</body>
</html>
