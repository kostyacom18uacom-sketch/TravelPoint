<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Point – Stránka v príprave</title>

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/dot-matrix" rel="stylesheet">

    <!-- Lottie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <!-- LOADER -->
    <div id="page-loader">
        <div id="globe-animation"></div>
        <div id="loader-bottom-area">
            <div id="loader-bar-track">
                <div id="loader-bar-fill"></div>
            </div>
            <div id="loader-counter">0%</div>
        </div>
    </div>

    <main class="stub-page">
        <div class="stub-logo">
            <img src="travelpoint-logo.svg" alt="Travel Point logo">
        </div>

        <!-- LANGUAGE SWITCHER -->
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="sk" aria-label="Slovenčina">SK</button>
            <span class="lang-divider">|</span>
            <button class="lang-btn" data-lang="en" aria-label="English">EN</button>
        </div>

        <div class="stub-content">
            <div id="progress-animation"></div>
            <h1 class="stub-title" data-i18n="stub.title">Cestovateľský raj v príprave</h1>
            <p class="stub-desc" data-i18n="stub.desc">
                Vaše vysnívané dobrodružstvo je už na obzore. Práve pre vás vylaďujeme túto sekciu, aby sme vám priniesli tie najlepšie ponuky z celého sveta. Zostaňte s nami!
            </p>
            <a href="anketa.html" class="btn stub-btn" data-i18n="stub.btn">Zapísať sa na konzultáciu</a>
        </div>
    </main>

    <!-- FOOTER (injected by footer.js) -->
    <div id="site-footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="loader.js"></script>
    <script src="footer.js"></script>

    <script>
      (function () {
          // Page-specific progress animation
          lottie.loadAnimation({
              container: document.getElementById('progress-animation'),
              renderer: 'svg',
              loop: true,
              autoplay: true,
              path: 'Progress.json'
          });

          // Loader: wait for both timer AND page load
          var pageLoaded = false, counterDone = false;

          window.addEventListener('load', function () {
              pageLoaded = true;
              if (counterDone) TpLoader.hide();
          });

          TpLoader.run(null, function () {
              counterDone = true;
              if (pageLoaded) TpLoader.hide();
          });
      })();
    </script>

    <script src="i18n.js"></script>
    <script src="cursor.js"></script>
</body>
</html>
